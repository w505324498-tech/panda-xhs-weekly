name: Panda XHS Weekly

on:
  schedule:
    # Every Monday at 8:43 AM Beijing time (UTC+8) = 00:43 UTC Monday
    # Non-round minute avoids GitHub scheduler congestion (peak loads drop :00 jobs)
    - cron: "43 0 * * 1"
  workflow_dispatch: {}

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Panda XHS Weekly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || '' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
        run: python -m src.main
